  <text x="45" y="465" font-size="9" fill="#15803D">Design: DONE (docs/ + Notion)</text>

  <!-- Phase boxes in a row -->
  <rect x="45" y="475" width="260" height="32" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="175" y="495" text-anchor="middle" font-weight="bold" font-size="10" fill="#1E40AF">Phase 0: File Reorganization — NEXT</text>

  <line x1="305" y1="491" x2="315" y2="491" stroke="#aaa" stroke-width="1"/>

  <rect x="315" y="475" width="260" height="32" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="445" y="495" text-anchor="middle" font-weight="bold" font-size="10" fill="#C2410C">Phase 1: Optimizer Core</text>

  <line x1="575" y1="491" x2="585" y2="491" stroke="#aaa" stroke-width="1"/>

  <rect x="585" y="475" width="260" height="32" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="715" y="495" text-anchor="middle" font-weight="bold" font-size="10" fill="#C2410C">Phase 2: Client Wrappers</text>

  <line x1="845" y1="491" x2="855" y2="491" stroke="#aaa" stroke-width="1"/>

  <rect x="855" y="475" width="260" height="32" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="985" y="495" text-anchor="middle" font-weight="bold" font-size="10" fill="#C2410C">Phase 3: Advanced Rules</text>

  <line x1="1115" y1="491" x2="1125" y2="491" stroke="#aaa" stroke-width="1"/>

  <rect x="1125" y="475" width="315" height="32" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="1282" y="495" text-anchor="middle" font-weight="bold" font-size="10" fill="#C2410C">Phase 4: Proxy Refactor</text>

  <!-- ═══ Package Structure ═══ -->
  <rect x="30" y="535" width="1425" height="130" rx="3" fill="none" stroke="#ddd"/>
  <text x="45" y="555" font-size="11" font-weight="bold" fill="#333">Package Structure (Target)</text>

  <text x="45"  y="575" font-family="monospace" font-size="9" fill="#333">contextpilot/</text>
  <text x="45"  y="588" font-family="monospace" font-size="9" fill="#7B61FF">  optimizer/           NEW: core.py, parser.py, planner.py, catalog.py, cost_model.py, rules/{base,reorder,dedup,prefetch,prune,merge}.py</text>
  <text x="45"  y="601" font-family="monospace" font-size="9" fill="#22C55E">  engine/              MOVED: cache_index.py, tree.py, distance.py, scheduler.py, live_index.py, eviction.py, metadata.py</text>
  <text x="45"  y="614" font-family="monospace" font-size="9" fill="#4A90D9">  proxy/               MOVED: server.py, interceptor.py, http_client.py</text>
  <text x="45"  y="627" font-family="monospace" font-size="9" fill="#4A90D9">  integrations/        MOVED+NEW: openai_client.py, anthropic_client.py, retrievers/{bm25,faiss,mem0,pageindex}.py, hooks/{sglang,vllm,llamacpp}.py</text>
  <text x="45"  y="640" font-family="monospace" font-size="9" fill="#888">  pipeline/, utils/    KEPT     |  _compat.py  NEW: old imports forwarded  |  __init__.py  UPDATED: cp.optimize(), cp.openai</text>

  <!-- ═══ Legend ═══ -->
  <rect x="30" y="675" width="1425" height="22" rx="3" fill="none" stroke="#eee"/>
  <rect x="45" y="680" width="12" height="10" rx="1" fill="#F3F0FF" stroke="#7B61FF"/>
  <text x="62" y="690" font-size="8" fill="#666">Existing (wrap)</text>
  <rect x="145" y="680" width="12" height="10" rx="1" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="162" y="690" font-size="8" fill="#666">New</text>
  <rect x="200" y="680" width="12" height="10" rx="1" fill="#f8f8f8" stroke="#ccc" stroke-dasharray="3 2"/>
  <text x="217" y="690" font-size="8" fill="#666">Pluggable</text>
  <rect x="275" y="680" width="12" height="10" rx="1" fill="#DBEAFE" stroke="#3B82F6"/>
