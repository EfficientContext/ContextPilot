<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#555"/>
    </marker>
    <marker id="b" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#7B61FF"/>
    </marker>
  </defs>

  <rect width="880" height="720" fill="#fff"/>

  <!-- Title -->
  <text x="440" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Context Optimizer — End-to-End Flow</text>
  <text x="440" y="40" text-anchor="middle" font-size="10" fill="#888">Like a SQL Query Optimizer: messages in → optimized messages out. &lt;15ms total, zero LLM calls.</text>

  <!-- ═══ INPUT ═══ -->
  <rect x="30" y="56" width="320" height="38" rx="3" fill="#f5f5f5" stroke="#aaa"/>
  <text x="40" y="72" font-weight="bold" fill="#333" font-size="11">INPUT</text>
  <text x="100" y="72" font-size="10" fill="#555">messages[] — 47,832 tokens, 12 blocks</text>
  <text x="100" y="86" font-size="9" fill="#888">User sends prompt to LLM (OpenAI, Anthropic, ...)</text>

  <!-- Arrow down -->
  <line x1="190" y1="94" x2="190" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 1: PARSE ═══ -->
  <rect x="30" y="114" width="320" height="58" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="133" font-weight="bold" fill="#7B61FF" font-size="12">1. PARSE</text>
  <text x="120" y="133" font-size="10" fill="#333">Split prompt into typed blocks</text>
  <text x="40" y="149" font-size="9" fill="#555">Regex + tag matching. Detect block boundaries.</text>
  <text x="40" y="162" font-size="9" fill="#999">&lt;5ms · parser.py</text>

  <!-- Parse output → right side -->
  <line x1="350" y1="143" x2="400" y2="143" stroke="#7B61FF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>

  <rect x="402" y="112" width="448" height="62" rx="2" fill="#f9f9f9" stroke="#ddd"/>
  <text x="412" y="128" font-weight="bold" fill="#333" font-size="10">Output: BlockTree</text>
  <rect x="412" y="135" width="58" height="18" rx="2" fill="#E0E7FF" stroke="#6366F1"/>
  <text x="441" y="148" text-anchor="middle" font-size="8" font-weight="bold" fill="#4338CA">skill</text>
  <rect x="476" y="135" width="58" height="18" rx="2" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="505" y="148" text-anchor="middle" font-size="8" font-weight="bold" fill="#1D4ED8">memory</text>
  <rect x="540" y="135" width="58" height="18" rx="2" fill="#D1FAE5" stroke="#10B981"/>
  <text x="569" y="148" text-anchor="middle" font-size="8" font-weight="bold" fill="#065F46">search</text>
  <rect x="604" y="135" width="58" height="18" rx="2" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="633" y="148" text-anchor="middle" font-size="8" font-weight="bold" fill="#92400E">file</text>
  <text x="412" y="168" font-size="8" fill="#888">Each skill block further split by §headings into sections</text>

  <!-- Arrow down -->
  <line x1="190" y1="172" x2="190" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 2: ANALYZE ═══ -->
  <rect x="30" y="192" width="320" height="58" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="211" font-weight="bold" fill="#7B61FF" font-size="12">2. ANALYZE</text>
  <text x="130" y="211" font-size="10" fill="#333">Look up stats for each block</text>
  <text x="40" y="227" font-size="9" fill="#555">Query Catalog for frequency, recency, cache state.</text>
  <text x="40" y="240" font-size="9" fill="#999">&lt;1ms · catalog.py</text>

  <!-- Catalog feeds into Analyze -->
  <line x1="350" y1="221" x2="400" y2="221" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="402" y="190" width="448" height="62" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="412" y="206" font-weight="bold" fill="#92400E" font-size="10">CATALOG (usage stats + skill registry)</text>
  <text x="412" y="221" font-size="9" fill="#555">skill:whisper → freq=12, last=2min, hot</text>
  <text x="412" y="234" font-size="9" fill="#555">skill:whisper/§Advanced → freq=0, never used</text>
  <text x="412" y="247" font-size="9" fill="#555">search:web → freq=1, cold  |  file:audio.py → freq=4</text>

  <!-- Arrow down -->
  <line x1="190" y1="250" x2="190" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 3: PLAN (biggest section — shows each rule) ═══ -->
  <rect x="30" y="270" width="320" height="58" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="289" font-weight="bold" fill="#7B61FF" font-size="12">3. PLAN</text>
  <text x="110" y="289" font-size="10" fill="#333">Evaluate rules, pick best combo</text>
  <text x="40" y="305" font-size="9" fill="#555">Cost Model estimates benefit of each rule.</text>
  <text x="40" y="318" font-size="9" fill="#999">&lt;2ms · planner.py + cost_model.py</text>

  <!-- Rules evaluation → right side -->
  <line x1="350" y1="299" x2="400" y2="299" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="402" y="268" width="448" height="175" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="412" y="284" font-weight="bold" fill="#92400E" font-size="10">RULES evaluated (each is a plugin):</text>

  <!-- REORDER -->
  <rect x="412" y="292" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="301" font-size="10" font-weight="bold" fill="#333">REORDER</text>
  <text x="500" y="301" font-size="9" fill="#555">Re-sort blocks so similar ones are adjacent</text>
  <text x="500" y="313" font-size="9" fill="#888">→ share 6,400 tok in LLM prefix cache</text>

  <!-- DEDUP -->
  <rect x="412" y="322" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="331" font-size="10" font-weight="bold" fill="#333">DEDUP</text>
  <text x="478" y="331" font-size="9" fill="#555">Remove content already sent in previous turns</text>
  <text x="478" y="343" font-size="9" fill="#888">→ remove search:web (sent in Turn 2), save 6,100 tok</text>

  <!-- PREFETCH -->
  <rect x="412" y="352" width="10" height="10" rx="1" fill="#E5E7EB"/>
  <text x="428" y="361" font-size="10" font-weight="bold" fill="#333">PREFETCH</text>
  <text x="502" y="361" font-size="9" fill="#555">Predict needed skills and inject them</text>
  <text x="502" y="373" font-size="9" fill="#888">→ skip (skill:whisper already present). Would inject if missing.</text>

  <!-- PRUNE -->
  <rect x="412" y="382" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="391" font-size="10" font-weight="bold" fill="#333">PRUNE</text>
  <text x="480" y="391" font-size="9" fill="#555">Trim unused sections to fit token budget</text>
  <text x="480" y="403" font-size="9" fill="#888">→ remove §Advanced (freq=0), save 1,200 tok</text>

  <!-- MERGE -->
  <rect x="412" y="412" width="10" height="10" rx="1" fill="#E5E7EB"/>
  <text x="428" y="421" font-size="10" font-weight="bold" fill="#333">MERGE</text>
  <text x="482" y="421" font-size="9" fill="#555">Combine co-occurring blocks for better caching</text>
  <text x="482" y="433" font-size="9" fill="#888">→ skip (no co-occurring pair detected)</text>

  <!-- Legend for green/gray squares -->
  <rect x="700" y="284" width="8" height="8" rx="1" fill="#22C55E"/>
  <text x="712" y="292" font-size="8" fill="#666">applied</text>
  <rect x="755" y="284" width="8" height="8" rx="1" fill="#E5E7EB"/>
  <text x="767" y="292" font-size="8" fill="#666">skipped</text>

  <!-- Arrow down -->
  <line x1="190" y1="328" x2="190" y2="455" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 4: EXECUTE ═══ -->
  <rect x="30" y="457" width="320" height="58" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="476" font-weight="bold" fill="#7B61FF" font-size="12">4. EXECUTE</text>
  <text x="130" y="476" font-size="10" fill="#333">Apply the plan to messages</text>
  <text x="40" y="492" font-size="9" fill="#555">Reorder blocks, remove dedup'd, trim pruned sections.</text>
  <text x="40" y="505" font-size="9" fill="#999">&lt;5ms · executor.py</text>

  <!-- Execute details → right side -->
  <line x1="350" y1="486" x2="400" y2="486" stroke="#7B61FF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>

  <rect x="402" y="457" width="448" height="58" rx="2" fill="#f9f9f9" stroke="#ddd"/>
  <text x="412" y="473" font-weight="bold" fill="#333" font-size="10">Actions taken:</text>
  <text x="412" y="488" font-size="9" fill="#555">1. Reorder: skill:whisper moved to top (prefix sharing)</text>
  <text x="412" y="501" font-size="9" fill="#555">2. Remove: search:web block (dedup)  3. Trim: §Advanced section (prune)</text>

  <!-- Arrow down -->
  <line x1="190" y1="515" x2="190" y2="533" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ OUTPUT ═══ -->
  <rect x="30" y="535" width="320" height="38" rx="3" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="40" y="551" font-weight="bold" fill="#15803D" font-size="11">OUTPUT</text>
  <text x="110" y="551" font-size="10" fill="#333">optimized messages[] — 31,206 tokens</text>
  <text x="110" y="565" font-size="10" fill="#15803D" font-weight="bold">Saved 16,626 tokens (34.8%)</text>

  <!-- Arrow down -->
  <line x1="190" y1="573" x2="190" y2="591" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ LLM ═══ -->
  <rect x="30" y="593" width="320" height="32" rx="3" fill="#f5f5f5" stroke="#aaa"/>
  <text x="40" y="613" font-weight="bold" fill="#333" font-size="11">LLM</text>
  <text x="75" y="613" font-size="10" fill="#888">OpenAI / Anthropic / SGLang / vLLM / llama.cpp</text>

  <!-- ═══ How to use (integration) ═══ -->
  <rect x="402" y="535" width="448" height="90" rx="2" fill="#EBF3FB" stroke="#4A90D9"/>
  <text x="412" y="551" font-weight="bold" fill="#4A90D9" font-size="10">Integration (pick one):</text>
  <text x="412" y="567" font-family="monospace" font-size="9" fill="#333">L0  $ contextpilot serve --port 8765      # zero code change</text>
  <text x="412" y="581" font-family="monospace" font-size="9" fill="#333">L1  client = cp.openai.Client()           # 1-line change</text>
  <text x="412" y="595" font-family="monospace" font-size="9" fill="#333">L2  optimized = cp.optimize(messages)      # explicit call</text>
  <text x="412" y="609" font-family="monospace" font-size="9" fill="#333">L3  optimizer = cp.ContextOptimizer(...)   # full control</text>

  <!-- ═══ EXPLAIN callout ═══ -->
  <rect x="30" y="640" width="820" height="30" rx="2" fill="#1E1B4B"/>
  <text x="40" y="659" font-family="monospace" font-size="10" fill="#C4B5FD">cp.explain(messages)</text>
  <text x="220" y="659" font-size="10" fill="#A5B4FC">Show this entire plan without executing — like SQL EXPLAIN</text>

  <!-- Performance -->
  <text x="440" y="695" text-anchor="middle" font-size="9" fill="#999">Parse(&lt;5ms) + Analyze(&lt;1ms) + Plan(&lt;2ms) + Execute(&lt;5ms) = &lt;15ms total overhead. All regex, zero LLM calls.</text>
</svg>
