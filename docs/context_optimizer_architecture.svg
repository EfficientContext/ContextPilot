<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 920" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#555"/>
    </marker>
    <marker id="b" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#7B61FF"/>
    </marker>
    <marker id="c" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#D97706"/>
    </marker>
  </defs>

  <rect width="880" height="920" fill="#fff"/>

  <!-- Title -->
  <text x="440" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Context Optimizer + KV Engine — End-to-End Flow</text>
  <text x="440" y="40" text-anchor="middle" font-size="10" fill="#888">Client-side context optimization + Server-side KV cache control (SGLang radix tree)</text>

  <!-- ═══════════════ CLIENT SIDE ═══════════════ -->
  <text x="30" y="60" font-size="9" font-weight="bold" fill="#7B61FF" letter-spacing="2">CLIENT SIDE — CONTEXT OPTIMIZER</text>
  <line x1="30" y1="64" x2="850" y2="64" stroke="#7B61FF" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- ═══ INPUT ═══ -->
  <rect x="30" y="72" width="320" height="38" rx="3" fill="#f5f5f5" stroke="#aaa"/>
  <text x="40" y="88" font-weight="bold" fill="#333" font-size="11">INPUT</text>
  <text x="100" y="88" font-size="10" fill="#555">messages[] — 47,832 tokens, 12 blocks</text>
  <text x="100" y="102" font-size="9" fill="#888">User sends prompt to LLM (OpenAI, Anthropic, ...)</text>

  <!-- Arrow down -->
  <line x1="190" y1="110" x2="190" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 1: PARSE ═══ -->
  <rect x="30" y="128" width="320" height="52" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="147" font-weight="bold" fill="#7B61FF" font-size="12">1. PARSE</text>
  <text x="120" y="147" font-size="10" fill="#333">Split prompt into typed blocks</text>
  <text x="40" y="161" font-size="9" fill="#555">Regex + tag matching. Detect block boundaries.</text>
  <text x="40" y="173" font-size="9" fill="#999">&lt;5ms · parser.py</text>

  <!-- Parse output → right side -->
  <line x1="350" y1="154" x2="400" y2="154" stroke="#7B61FF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>

  <rect x="402" y="126" width="448" height="56" rx="2" fill="#f9f9f9" stroke="#ddd"/>
  <text x="412" y="142" font-weight="bold" fill="#333" font-size="10">Output: BlockTree</text>
  <rect x="412" y="149" width="55" height="18" rx="2" fill="#E0E7FF" stroke="#6366F1"/>
  <text x="440" y="162" text-anchor="middle" font-size="8" font-weight="bold" fill="#4338CA">skill</text>
  <rect x="473" y="149" width="55" height="18" rx="2" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="501" y="162" text-anchor="middle" font-size="8" font-weight="bold" fill="#1D4ED8">memory</text>
  <rect x="534" y="149" width="55" height="18" rx="2" fill="#D1FAE5" stroke="#10B981"/>
  <text x="562" y="162" text-anchor="middle" font-size="8" font-weight="bold" fill="#065F46">search</text>
  <rect x="595" y="149" width="55" height="18" rx="2" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="623" y="162" text-anchor="middle" font-size="8" font-weight="bold" fill="#92400E">file</text>
  <rect x="656" y="149" width="55" height="18" rx="2" fill="#FCE7F3" stroke="#EC4899"/>
  <text x="684" y="162" text-anchor="middle" font-size="8" font-weight="bold" fill="#9D174D">system</text>
  <text x="412" y="178" font-size="8" fill="#888">Each skill block further split by §headings into sections</text>

  <!-- Arrow down -->
  <line x1="190" y1="180" x2="190" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 2: ANALYZE ═══ -->
  <rect x="30" y="198" width="320" height="52" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="217" font-weight="bold" fill="#7B61FF" font-size="12">2. ANALYZE</text>
  <text x="130" y="217" font-size="10" fill="#333">Look up stats for each block</text>
  <text x="40" y="231" font-size="9" fill="#555">Query Catalog for frequency, recency, co-occurrence.</text>
  <text x="40" y="243" font-size="9" fill="#999">&lt;1ms · catalog.py</text>

  <!-- Catalog feeds into Analyze -->
  <line x1="350" y1="224" x2="400" y2="224" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="402" y="196" width="448" height="56" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="412" y="212" font-weight="bold" fill="#92400E" font-size="10">CATALOG (usage stats + skill registry)</text>
  <text x="412" y="226" font-size="9" fill="#555">skill:whisper → freq=12, last=2min, hot</text>
  <text x="412" y="239" font-size="9" fill="#555">memory+file co-occur 92% | skill:whisper/§Advanced → freq=0</text>

  <!-- Arrow down -->
  <line x1="190" y1="250" x2="190" y2="266" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 3: PLAN ═══ -->
  <rect x="30" y="268" width="320" height="52" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="287" font-weight="bold" fill="#7B61FF" font-size="12">3. PLAN</text>
  <text x="110" y="287" font-size="10" fill="#333">Evaluate rules, pick best combo</text>
  <text x="40" y="301" font-size="9" fill="#555">Cost Model estimates benefit of each rule.</text>
  <text x="40" y="313" font-size="9" fill="#999">&lt;2ms · planner.py + cost_model.py</text>

  <!-- Rules → right side -->
  <line x1="350" y1="294" x2="400" y2="294" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="402" y="266" width="448" height="182" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="412" y="282" font-weight="bold" fill="#92400E" font-size="10">RULES evaluated (each is a plugin):</text>

  <!-- REORDER — applied -->
  <rect x="412" y="290" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="299" font-size="10" font-weight="bold" fill="#333">REORDER</text>
  <text x="500" y="299" font-size="9" fill="#555">Sort blocks so common prefix is maximized</text>
  <text x="500" y="311" font-size="9" fill="#22C55E">→ move skill:whisper to top, share 6,400 tok KV prefix</text>

  <!-- DEDUP — applied -->
  <rect x="412" y="320" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="329" font-size="10" font-weight="bold" fill="#333">DEDUP</text>
  <text x="478" y="329" font-size="9" fill="#555">Remove content already sent in previous turns</text>
  <text x="478" y="341" font-size="9" fill="#22C55E">→ remove search:web (sent in Turn 2), save 6,100 tok</text>

  <!-- PREFETCH — applied -->
  <rect x="412" y="350" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="359" font-size="10" font-weight="bold" fill="#333">PREFETCH</text>
  <text x="502" y="359" font-size="9" fill="#555">Predict needed skills → inject + pre-warm KV</text>
  <text x="502" y="371" font-size="9" fill="#22C55E">→ inject skill:notion (keyword match), pre-insert KV via kv.insert()</text>

  <!-- PRUNE — applied -->
  <rect x="412" y="380" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="389" font-size="10" font-weight="bold" fill="#333">PRUNE</text>
  <text x="480" y="389" font-size="9" fill="#555">Trim unused sections to fit token budget</text>
  <text x="480" y="401" font-size="9" fill="#22C55E">→ remove §Advanced (freq=0), save 1,200 tok</text>

  <!-- MERGE — applied -->
  <rect x="412" y="410" width="10" height="10" rx="1" fill="#22C55E"/>
  <text x="428" y="419" font-size="10" font-weight="bold" fill="#333">MERGE</text>
  <text x="482" y="419" font-size="9" fill="#555">Combine co-occurring blocks for better caching</text>
  <text x="482" y="431" font-size="9" fill="#22C55E">→ merge memory+file (co-occur 92%) into 1 block for prefix reuse</text>

  <!-- Legend -->
  <rect x="745" y="282" width="8" height="8" rx="1" fill="#22C55E"/>
  <text x="757" y="290" font-size="8" fill="#666">applied</text>

  <!-- Arrow down -->
  <line x1="190" y1="320" x2="190" y2="460" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 4: EXECUTE ═══ -->
  <rect x="30" y="462" width="320" height="52" rx="3" fill="#F3F0FF" stroke="#7B61FF" stroke-width="2"/>
  <text x="40" y="481" font-weight="bold" fill="#7B61FF" font-size="12">4. EXECUTE</text>
  <text x="130" y="481" font-size="10" fill="#333">Apply the plan to messages</text>
  <text x="40" y="495" font-size="9" fill="#555">Reorder, dedup, inject, prune, merge blocks.</text>
  <text x="40" y="507" font-size="9" fill="#999">&lt;5ms · executor.py</text>

  <!-- Execute → right side -->
  <line x1="350" y1="488" x2="400" y2="488" stroke="#7B61FF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#b)"/>

  <rect x="402" y="462" width="448" height="52" rx="2" fill="#f9f9f9" stroke="#ddd"/>
  <text x="412" y="478" font-weight="bold" fill="#333" font-size="10">Actions taken:</text>
  <text x="412" y="492" font-size="9" fill="#555">1. Reorder blocks  2. Remove search:web  3. Inject skill:notion</text>
  <text x="412" y="505" font-size="9" fill="#555">4. Trim §Advanced  5. Merge memory+file → single block</text>

  <!-- Arrow down -->
  <line x1="190" y1="514" x2="190" y2="530" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ OUTPUT ═══ -->
  <rect x="30" y="532" width="320" height="38" rx="3" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="40" y="548" font-weight="bold" fill="#15803D" font-size="11">OUTPUT</text>
  <text x="110" y="548" font-size="10" fill="#333">optimized messages[] — 31,206 tokens</text>
  <text x="110" y="562" font-size="10" fill="#15803D" font-weight="bold">Saved 16,626 tokens (34.8%)</text>

  <!-- Integration box -->
  <rect x="402" y="530" width="448" height="42" rx="2" fill="#EBF3FB" stroke="#4A90D9"/>
  <text x="412" y="546" font-weight="bold" fill="#4A90D9" font-size="10">Integration (pick one):</text>
  <text x="412" y="562" font-family="monospace" font-size="8" fill="#333">L0 proxy (0 code) | L1 wrapper (1 line) | L2 cp.optimize() | L3 full control</text>

  <!-- Arrow down -->
  <line x1="190" y1="570" x2="190" y2="590" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════ SERVER SIDE ═══════════════ -->
  <text x="30" y="600" font-size="9" font-weight="bold" fill="#D97706" letter-spacing="2">SERVER SIDE — KV CACHE ENGINE (SGLANG RADIX TREE)</text>
  <line x1="30" y1="604" x2="850" y2="604" stroke="#D97706" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- ═══ STEP 5: KV INSERT ═══ -->
  <rect x="30" y="612" width="380" height="68" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="40" y="631" font-weight="bold" fill="#D97706" font-size="12">5. KV.INSERT</text>
  <text x="155" y="631" font-size="10" fill="#333">Pre-compute KV for block sequences</text>
  <text x="40" y="647" font-size="9" fill="#555">Tokenize blocks → prefill forward pass → store in radix tree.</text>
  <text x="40" y="660" font-family="monospace" font-size="8" fill="#333">h = engine.kv_insert(blocks=[sys, doc1]) → handle</text>
  <text x="40" y="672" font-size="9" fill="#999">Returns handle with block boundaries for reuse.</text>

  <!-- Radix tree diagram → right side -->
  <rect x="420" y="612" width="430" height="68" rx="2" fill="#f9f9f9" stroke="#D97706"/>
  <text x="430" y="628" font-weight="bold" fill="#92400E" font-size="10">Radix Tree (KV cache indexed by token prefix):</text>

  <!-- Tree structure -->
  <text x="470" y="646" font-family="monospace" font-size="10" fill="#333">[root]</text>
  <line x1="490" y1="649" x2="490" y2="664" stroke="#555" stroke-width="1"/>
  <rect x="450" y="665" width="80" height="14" rx="2" fill="#E0E7FF" stroke="#6366F1"/>
  <text x="490" y="675" text-anchor="middle" font-family="monospace" font-size="8" fill="#4338CA">sys tokens</text>

  <!-- Branch to doc1 -->
  <line x1="490" y1="679" x2="540" y2="679" stroke="#555" stroke-width="1"/>
  <line x1="540" y1="668" x2="540" y2="679" stroke="#555" stroke-width="1"/>
  <rect x="545" y="660" width="70" height="14" rx="2" fill="#D1FAE5" stroke="#10B981"/>
  <text x="580" y="670" text-anchor="middle" font-family="monospace" font-size="7" fill="#065F46">doc1 →h_a</text>

  <!-- Branch to doc2 -->
  <line x1="540" y1="679" x2="540" y2="679" stroke="#555" stroke-width="1"/>
  <rect x="545" y="676" width="70" height="14" rx="2" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="580" y="686" text-anchor="middle" font-family="monospace" font-size="7" fill="#92400E">doc2 →h_b</text>

  <!-- Shared label -->
  <text x="640" y="667" font-size="8" fill="#22C55E" font-weight="bold">← shared</text>
  <text x="640" y="678" font-size="8" fill="#888">KV computed once</text>

  <!-- Arrow down -->
  <line x1="190" y1="680" x2="190" y2="696" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ STEP 6: KV REUSE + GENERATE ═══ -->
  <rect x="30" y="698" width="380" height="62" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="40" y="717" font-weight="bold" fill="#D97706" font-size="12">6. GENERATE + KV.REUSE</text>
  <text x="40" y="733" font-size="9" fill="#555">Reference handle instead of re-sending context.</text>
  <text x="40" y="746" font-family="monospace" font-size="8" fill="#333">engine.generate(reuse_handle=h, text="Q?")</text>
  <text x="40" y="757" font-size="9" fill="#22C55E" font-weight="bold">Only new tokens need prefill — cached prefix skipped.</text>

  <!-- Auto-batch → right side -->
  <rect x="420" y="698" width="430" height="62" rx="2" fill="#f9f9f9" stroke="#D97706"/>
  <text x="430" y="714" font-weight="bold" fill="#92400E" font-size="10">Auto-Batch by Shared Prefix:</text>
  <text x="430" y="730" font-size="9" fill="#555">Req1: reuse=h_a + "Q1?"  ──┐</text>
  <text x="430" y="742" font-size="9" fill="#555">Req2: reuse=h_a + "Q2?"  ──┤ same prefix → batched</text>
  <text x="430" y="754" font-size="9" fill="#555">Req3: reuse=h_b + "Q3?"  ──┘ shares sys → partial batch</text>

  <!-- Arrow down -->
  <line x1="190" y1="760" x2="190" y2="776" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ LLM ═══ -->
  <rect x="30" y="778" width="380" height="32" rx="3" fill="#f5f5f5" stroke="#aaa"/>
  <text x="40" y="798" font-weight="bold" fill="#333" font-size="11">LLM</text>
  <text x="75" y="798" font-size="10" fill="#888">SGLang / vLLM / llama.cpp (GPU forward pass)</text>

  <!-- ═══ Savings summary → right side of LLM ═══ -->
  <rect x="420" y="778" width="430" height="32" rx="2" fill="#F0FDF4" stroke="#22C55E"/>
  <text x="430" y="798" font-size="10" fill="#15803D" font-weight="bold">Total savings: 34.8% fewer tokens + KV reuse across requests</text>

  <!-- ═══ EXPLAIN callout ═══ -->
  <rect x="30" y="830" width="820" height="30" rx="2" fill="#1E1B4B"/>
  <text x="40" y="849" font-family="monospace" font-size="10" fill="#C4B5FD">cp.explain(messages)</text>
  <text x="220" y="849" font-size="10" fill="#A5B4FC">Show this entire plan without executing — like SQL EXPLAIN</text>

  <!-- ═══ Latency footer ═══ -->
  <text x="440" y="885" text-anchor="middle" font-size="9" fill="#999">Client: Parse(&lt;5ms) + Analyze(&lt;1ms) + Plan(&lt;2ms) + Execute(&lt;5ms) = &lt;15ms total. All regex, zero LLM calls.</text>
  <text x="440" y="900" text-anchor="middle" font-size="9" fill="#999">Server: KV.insert = 1 prefill pass (amortized). KV.reuse = 0 extra cost (radix tree lookup &lt;0.1ms).</text>
</svg>
