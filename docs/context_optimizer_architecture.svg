<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 700" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#555"/>
    </marker>
  </defs>

  <rect width="1500" height="700" fill="#fff"/>

  <!-- Title -->
  <text x="750" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Context Optimizer Architecture</text>
  <text x="750" y="43" text-anchor="middle" font-size="11" fill="#888">Analogous to SQL Query Optimizer</text>

  <!-- ═══ User App ═══ -->
  <rect x="30" y="155" width="85" height="48" rx="3" fill="#f5f5f5" stroke="#aaa"/>
  <text x="72" y="176" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">User</text>
  <text x="72" y="189" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Application</text>

  <line x1="115" y1="179" x2="138" y2="179" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ Integration Layer ═══ -->
  <rect x="140" y="58" width="155" height="260" rx="3" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <text x="217" y="75" text-anchor="middle" font-weight="bold" fill="#4A90D9" font-size="10">INTEGRATION</text>

  <rect x="152" y="85" width="131" height="34" rx="2" fill="#EBF3FB" stroke="#4A90D9"/>
  <text x="217" y="101" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">L0: HTTP Proxy</text>
  <text x="217" y="113" text-anchor="middle" font-size="8" fill="#666">cp serve</text>

  <rect x="152" y="125" width="131" height="34" rx="2" fill="#EBF3FB" stroke="#4A90D9"/>
  <text x="217" y="141" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">L1: Client Wrapper</text>
  <text x="217" y="153" text-anchor="middle" font-size="8" fill="#666">cp.openai.Client()</text>

  <rect x="152" y="165" width="131" height="34" rx="2" fill="#EBF3FB" stroke="#4A90D9"/>
  <text x="217" y="181" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">L2: SDK Direct</text>
  <text x="217" y="193" text-anchor="middle" font-size="8" fill="#666">cp.optimize(msgs)</text>

  <rect x="152" y="205" width="131" height="34" rx="2" fill="#EBF3FB" stroke="#4A90D9"/>
  <text x="217" y="221" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">L3: Engine Hook</text>
  <text x="217" y="233" text-anchor="middle" font-size="8" fill="#666">sglang / vllm</text>

  <text x="217" y="260" text-anchor="middle" font-size="8" fill="#4A90D9">Phase 2</text>

  <!-- _compat.py bridge -->
  <rect x="140" y="320" width="155" height="14" rx="2" fill="#FEF2F2" stroke="#EF4444" stroke-dasharray="4 2"/>
  <text x="217" y="330" text-anchor="middle" font-size="7" fill="#DC2626">_compat.py (Phase 0)</text>

  <line x1="295" y1="179" x2="318" y2="179" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ Optimizer Core ═══ -->
  <rect x="320" y="58" width="690" height="276" rx="3" fill="none" stroke="#7B61FF" stroke-width="2"/>
  <text x="335" y="75" font-weight="bold" fill="#7B61FF" font-size="10">CONTEXT OPTIMIZER CORE</text>
  <text x="995" y="75" text-anchor="end" fill="#999" font-size="9">optimizer/ — Phase 1</text>

  <!-- Pipeline: 4 boxes -->
  <rect x="335" y="85" width="150" height="44" rx="2" fill="#F3F0FF" stroke="#7B61FF"/>
  <text x="410" y="103" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">1. PARSER</text>
  <text x="410" y="118" text-anchor="middle" font-size="8" fill="#666">Prompt → BlockTree &lt;5ms</text>

  <line x1="485" y1="107" x2="500" y2="107" stroke="#7B61FF" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="505" y="85" width="150" height="44" rx="2" fill="#F3F0FF" stroke="#7B61FF"/>
  <text x="580" y="103" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">2. ANALYZER</text>
  <text x="580" y="118" text-anchor="middle" font-size="8" fill="#666">Usage stats &lt;1ms</text>

  <line x1="655" y1="107" x2="670" y2="107" stroke="#7B61FF" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="675" y="85" width="150" height="44" rx="2" fill="#F3F0FF" stroke="#7B61FF"/>
  <text x="750" y="103" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">3. PLANNER</text>
  <text x="750" y="118" text-anchor="middle" font-size="8" fill="#666">Select rules &lt;2ms</text>

  <line x1="825" y1="107" x2="840" y2="107" stroke="#7B61FF" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="845" y="85" width="150" height="44" rx="2" fill="#F3F0FF" stroke="#7B61FF"/>
  <text x="920" y="103" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">4. EXECUTOR</text>
  <text x="920" y="118" text-anchor="middle" font-size="8" fill="#666">Apply plan &lt;5ms</text>

  <!-- Dashed lines to supporting -->
  <line x1="410" y1="129" x2="410" y2="145" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="580" y1="129" x2="580" y2="145" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="830" y1="129" x2="830" y2="145" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Supporting: Catalog -->
  <rect x="335" y="145" width="200" height="95" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="435" y="162" text-anchor="middle" font-weight="bold" fill="#92400E" font-size="10">CATALOG</text>
  <line x1="343" y1="168" x2="527" y2="168" stroke="#FCD34D" stroke-width="0.5"/>
  <text x="343" y="182" font-size="9" fill="#555">Skill Registry + keyword index</text>
  <text x="343" y="196" font-size="9" fill="#555">Usage Stats (freq, recency)</text>
  <text x="343" y="210" font-size="9" fill="#555">Block Registry + co-occurrence</text>
  <text x="343" y="228" font-size="9" fill="#888">catalog.py</text>

  <!-- Supporting: Cost Model -->
  <rect x="545" y="145" width="200" height="95" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="645" y="162" text-anchor="middle" font-weight="bold" fill="#92400E" font-size="10">COST MODEL</text>
  <line x1="553" y1="168" x2="737" y2="168" stroke="#FCD34D" stroke-width="0.5"/>
  <text x="553" y="182" font-size="9" fill="#555">Token estimation (chars/4)</text>
  <text x="553" y="196" font-size="9" fill="#555">Cache benefit (prefix shared)</text>
  <text x="553" y="210" font-size="9" fill="#555">Risk assessment (miss rate)</text>
  <text x="553" y="228" font-size="9" fill="#888">cost_model.py</text>

  <!-- Supporting: Rewrite Rules -->
  <rect x="755" y="145" width="240" height="95" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="875" y="162" text-anchor="middle" font-weight="bold" fill="#92400E" font-size="10">REWRITE RULES</text>
  <line x1="763" y1="168" x2="987" y2="168" stroke="#FCD34D" stroke-width="0.5"/>

  <!-- Rule grid 2x3 -->
  <rect x="763" y="175" width="70" height="24" rx="2" fill="#F3F0FF" stroke="#7B61FF"/>
  <text x="798" y="191" text-anchor="middle" font-size="8" font-weight="bold" fill="#5B21B6">Reorder</text>

  <rect x="839" y="175" width="70" height="24" rx="2" fill="#F3F0FF" stroke="#7B61FF"/>
  <text x="874" y="191" text-anchor="middle" font-size="8" font-weight="bold" fill="#5B21B6">Dedup</text>

  <rect x="915" y="175" width="70" height="24" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="950" y="191" text-anchor="middle" font-size="8" font-weight="bold" fill="#C2410C">Prefetch</text>

  <rect x="763" y="205" width="70" height="24" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="798" y="221" text-anchor="middle" font-size="8" font-weight="bold" fill="#C2410C">Prune</text>

  <rect x="839" y="205" width="70" height="24" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="874" y="221" text-anchor="middle" font-size="8" font-weight="bold" fill="#C2410C">Merge</text>

  <rect x="915" y="205" width="70" height="24" rx="2" fill="#f8f8f8" stroke="#ccc" stroke-dasharray="4 2"/>
  <text x="950" y="221" text-anchor="middle" font-size="8" fill="#999">Custom</text>

  <!-- EXPLAIN bar -->
  <rect x="335" y="252" width="660" height="30" rx="2" fill="#1E1B4B"/>
  <text x="345" y="271" font-family="monospace" font-size="9" fill="#C4B5FD">cp.explain(messages) → 47,832 tok → 31,206 tok  Saving: 34.8%</text>
  <text x="980" y="271" text-anchor="end" font-size="8" fill="#818CF8">= SQL EXPLAIN</text>

  <!-- EXPLAIN connects right to EXPLAIN output below, but for now just the bar -->

  <!-- Arrow Optimizer → Engine -->
  <line x1="1010" y1="179" x2="1033" y2="179" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ Execution Engine ═══ -->
  <rect x="1035" y="58" width="220" height="276" rx="3" fill="none" stroke="#22C55E" stroke-width="2"/>
  <text x="1145" y="75" text-anchor="middle" font-weight="bold" fill="#15803D" font-size="10">EXECUTION ENGINE</text>

  <rect x="1048" y="85" width="194" height="48" rx="2" fill="#F0FDF4" stroke="#22C55E"/>
  <text x="1145" y="103" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">Cache Index</text>
  <text x="1145" y="118" text-anchor="middle" font-size="8" fill="#666">Clustering + prefix tree</text>
  <text x="1145" y="128" text-anchor="middle" font-size="7" fill="#999">cache_index.py, tree.py</text>

  <rect x="1048" y="140" width="194" height="48" rx="2" fill="#F0FDF4" stroke="#22C55E"/>
  <text x="1145" y="158" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">Scheduler</text>
  <text x="1145" y="173" text-anchor="middle" font-size="8" fill="#666">Intra + Inter ordering</text>
  <text x="1145" y="183" text-anchor="middle" font-size="7" fill="#999">scheduler.py</text>

  <rect x="1048" y="195" width="194" height="48" rx="2" fill="#F0FDF4" stroke="#22C55E"/>
  <text x="1145" y="213" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">Eviction Manager</text>
  <text x="1145" y="228" text-anchor="middle" font-size="8" fill="#666">LRU + SGLang/vLLM sync</text>
  <text x="1145" y="238" text-anchor="middle" font-size="7" fill="#999">eviction.py</text>

  <rect x="1048" y="250" width="194" height="48" rx="2" fill="#F0FDF4" stroke="#22C55E"/>
  <text x="1145" y="268" text-anchor="middle" font-weight="bold" fill="#333" font-size="10">Pipeline (RAG)</text>
  <text x="1145" y="283" text-anchor="middle" font-size="8" fill="#666">Kept, uses optimizer</text>
  <text x="1145" y="293" text-anchor="middle" font-size="7" fill="#999">pipeline/</text>

  <text x="1145" y="325" text-anchor="middle" font-size="8" fill="#22C55E">engine/ — Phase 0</text>

  <!-- Arrow Engine → LLM -->
  <line x1="1255" y1="179" x2="1278" y2="179" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══ LLM Backend ═══ -->
  <rect x="1280" y="138" width="175" height="80" rx="3" fill="#f5f5f5" stroke="#aaa"/>
  <text x="1367" y="170" text-anchor="middle" font-weight="bold" fill="#333" font-size="11">LLM Backend</text>
  <text x="1367" y="186" text-anchor="middle" font-size="8" fill="#888">OpenAI / Anthropic</text>
  <text x="1367" y="198" text-anchor="middle" font-size="8" fill="#888">SGLang / vLLM / llama.cpp</text>

  <!-- ═══ Context Block Parser Detail (below main band) ═══ -->
  <rect x="320" y="340" width="690" height="70" rx="2" fill="#f9f9f9" stroke="#aaa" stroke-dasharray="5 3"/>
  <text x="335" y="357" font-weight="bold" fill="#333" font-size="10">CONTEXT BLOCK PARSER (Detail)</text>

  <rect x="335" y="365" width="80" height="28" rx="2" fill="#E0E7FF" stroke="#6366F1"/>
  <text x="375" y="383" text-anchor="middle" font-size="8" font-weight="bold" fill="#4338CA">skill</text>

  <rect x="423" y="365" width="80" height="28" rx="2" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="463" y="383" text-anchor="middle" font-size="8" font-weight="bold" fill="#1D4ED8">memory</text>

  <rect x="511" y="365" width="80" height="28" rx="2" fill="#D1FAE5" stroke="#10B981"/>
  <text x="551" y="383" text-anchor="middle" font-size="8" font-weight="bold" fill="#065F46">searched</text>

  <rect x="599" y="365" width="80" height="28" rx="2" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="639" y="383" text-anchor="middle" font-size="8" font-weight="bold" fill="#92400E">file_based</text>

  <text x="700" y="357" font-size="9" fill="#555">Section decomposition: skill:whisper → §Overview f=12, §Usage f=15, §Advanced f=0</text>
  <text x="700" y="400" font-size="9" fill="#888">Regex + tag matching, zero LLM calls, persist to ~/.contextpilot/block_usage.json</text>

  <!-- ═══ Refactoring Timeline ═══ -->
  <rect x="30" y="430" width="1425" height="90" rx="3" fill="none" stroke="#ddd"/>
